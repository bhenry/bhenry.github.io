<!DOCTYPE html>
<html lang="en">
  <head>
    <title>how old am i?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>
      <h2>how old am i?</h2>
        <div id="inputs">
            <form>
                <label for="dob">date of birth</label>
                <input type="text" id="dob" placeholder="yyyy-mm-dd hh:MM" />
            </form>
        </div>
        <div style="display:none;" id="results">
            <div>if you were born on <span id="dobdisplay"></span> <span id="tobdisplay"></span> then your age is:</div>
            <div class="age"><span id="age_in_years"></span> years</div>
            <div class="age"><span id="age_in_months"></span> months</div>
            <div class="age"><span id="age_in_weeks"></span> weeks</div>
            <div class="age"><span id="age_in_days"></span> days</div>
            <div class="age"><span id="age_in_hours"></span> hours</div>
            <div class="age"><span id="age_in_minutes"></span> minutes</div>
            <div class="age"><span id="age_in_seconds"></span> seconds</div>
        </div>
        <div id="errors" style="display:none;">
            <div>please enter a valid date of birth</div>
        </div>
    <script>
        function readDob(){
            return new Date(Date.parse(document.getElementById("dob").value));
        }

        function calculate(e) {
            e && e.preventDefault();
            var dob = readDob();
            var d = dob.toLocaleDateString("en-US", {month: "long", day: "numeric", year: "numeric"});
            var t = dob.toLocaleTimeString("en-US");
            document.getElementById("dobdisplay").innerHTML = d;

            if (t != "12:00:00 AM") {
                document.getElementById("tobdisplay").innerHTML = " at " + t;
            } else {
                document.getElementById("tobdisplay").innerHTML = "";
            }

            var age_in_years = Math.floor((new Date() - dob) / (1000 * 60 * 60 * 24 * 365));
            document.getElementById("age_in_years").innerHTML = age_in_years;
            var age_in_months = Math.floor((new Date() - dob) / (1000 * 60 * 60 * 24 * 30.5));
            document.getElementById("age_in_months").innerHTML = age_in_months;
            var age_in_weeks = Math.floor((new Date() - dob) / (1000 * 60 * 60 * 24 * 7));
            document.getElementById("age_in_weeks").innerHTML = age_in_weeks;
            var age_in_days = Math.floor((new Date() - dob) / (1000 * 60 * 60 * 24));
            document.getElementById("age_in_days").innerHTML = age_in_days;
            var age_in_hours = Math.floor((new Date() - dob) / (1000 * 60 * 60));
            document.getElementById("age_in_hours").innerHTML = age_in_hours;
            var age_in_minutes = Math.floor((new Date() - dob) / (1000 * 60));
            document.getElementById("age_in_minutes").innerHTML = age_in_minutes;
            var age_in_seconds = Math.floor((new Date() - dob) / 1000);
            document.getElementById("age_in_seconds").innerHTML = age_in_seconds;

            document.getElementById("results").style.display = "block";
        }

        function hidestuff(e) {
            var results = document.getElementById("results");
            var errors = document.getElementById("errors");
            var dob = readDob();
            if (new Date() - dob > 0) {
                calculate();
                results.style.display = "block";
                errors.style.display = "none";
            } else {
                errors.style.display = "block";
                results.style.display = "none";
            }
        }

        // listeners
        document.getElementById("dob").addEventListener("keyup", hidestuff);

        //ready
        document.getElementById("dob").focus();
    </script>
  </body>
</html>
